<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challan Checker</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 750px;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

h1 { text-align: center; }

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #444;
}

th {
  background: #334155;
  cursor: pointer;
}

tr:hover { background: #475569; }

.paid { color: #22c55e; }
.pending { color: #ef4444; }
</style>
</head>

<body>

<div class="container">
  <h1>🚗 Challan Checker</h1>

  <input id="vehicle" placeholder="Enter Vehicle Number (UP70AJ2399)">
  <button onclick="getChallan()">Check</button>

  <div id="loading"></div>
  <div id="result"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let challanData = [];

// AUTO FORMAT INPUT
document.getElementById("vehicle").addEventListener("input", e => {
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
});

async function getChallan() {
  const vehicle = document.getElementById("vehicle").value.trim();
  const result = document.getElementById("result");
  const loading = document.getElementById("loading");

  if (!vehicle) {
    result.innerHTML = "⚠️ Enter vehicle number";
    return;
  }

  loading.innerHTML = "⏳ Fetching data (wait if first time)...";
  result.innerHTML = "";

  try {
    const res = await fetch(`/api/challan?vehicle=${vehicle}`);
    const data = await res.json();

    loading.innerHTML = "";

    if (data.error) {
      result.innerHTML = "❌ " + data.error;
      return;
    }

    if (!Array.isArray(data) || data.length === 0) {
      result.innerHTML = "✅ No Challan Found";
      return;
    }

    challanData = data;
    renderTable(data);

  } catch (err) {
    loading.innerHTML = "";
    result.innerHTML = "❌ Server error. Try again.";
  }
}

// TABLE
function renderTable(data) {
  let html = `
    <input placeholder="Search..." onkeyup="searchTable(this.value)">
    <button onclick="downloadPDF()">Download PDF</button>

    <table>
      <thead>
        <tr>
          <th onclick="sortTable('challan_no')">Challan No</th>
          <th onclick="sortTable('date')">Date</th>
          <th>Reason</th>
          <th onclick="sortTable('amount')">Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
  `;

  data.forEach(c => {
    html += `
      <tr>
        <td>${c.challan_no || "N/A"}</td>
        <td>${c.date || "N/A"}</td>
        <td>${getReason(c.offense)}</td>
        <td>₹${c.amount || 0}</td>
        <td class="${c.status === 'Paid' ? 'paid' : 'pending'}">
          ${c.status || "Unknown"}
        </td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  document.getElementById("result").innerHTML = html;
}

// SEARCH
function searchTable(q) {
  q = q.toLowerCase();
  const filtered = challanData.filter(c =>
    (c.challan_no + c.date + (c.offense || "")).toLowerCase().includes(q)
  );
  renderTable(filtered);
}

// SORT
function sortTable(key) {
  challanData.sort((a, b) => {
    if (key === "amount") return (a[key] || 0) - (b[key] || 0);
    return (a[key] || "").toString().localeCompare((b[key] || "").toString());
  });
  renderTable(challanData);
}

// PDF
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;
  challanData.forEach((c, i) => {
    doc.text(`Challan ${i+1}`, 10, y); y+=8;
    doc.text(`No: ${c.challan_no || "-"}`, 10, y); y+=8;
    doc.text(`Date: ${c.date || "-"}`, 10, y); y+=8;
    doc.text(`Reason: ${getReason(c.offense)}`, 10, y); y+=8;
    doc.text(`Amount: Rs ${c.amount || 0}`, 10, y); y+=12;
  });

  doc.save("challan.pdf");
}

// REASON
function getReason(offense) {
  if (!offense) return "Unknown";

  offense = offense.toLowerCase();

  if (offense.includes("helmet")) return "No Helmet";
  if (offense.includes("speed")) return "Over Speeding";
  if (offense.includes("signal")) return "Signal Jump";
  if (offense.includes("seatbelt")) return "No Seatbelt";

  return offense;
}
</script>

</body>
</html>
