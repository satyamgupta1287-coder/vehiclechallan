<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChallanTrack</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(160deg,#060b18,#0f172a);
  color:#f1f5f9;
}

/* NAV */
nav{
  padding:14px 20px;
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

.logo{
  width:36px;
  height:36px;
  border-radius:10px;
  background:linear-gradient(135deg,#f97316,#dc2626);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* HERO */
.container{
  max-width:600px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  background:#0b1221;
  color:#fff;
  letter-spacing:2px;
}

button{
  margin-top:10px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#f97316,#dc2626);
  color:white;
  font-weight:bold;
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:14px;
  margin-top:12px;
}

.red{color:#ef4444;}
.green{color:#22c55e;}

.loader{
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<nav>
<div class="logo">🚔</div>
<div><b>ChallanTrack</b></div>
</nav>

<div class="container">

<h2>Check Vehicle Challan</h2>

<input id="num" placeholder="MH12AB1234">
<button onclick="search()">CHECK</button>

<div id="result"></div>

</div>

<script>

function fmt(date){
  if(!date) return "—";
  return new Date(date).toLocaleString("en-IN");
}

// 🔥 retry + stable fetch
async function fetchData(url){
  for(let i=0;i<3;i++){
    try{
      let res=await fetch(url);
      let text=await res.text();
      return JSON.parse(text);
    }catch{
      await new Promise(r=>setTimeout(r,2000));
    }
  }
  throw "fail";
}

async function search(){

  let num=document.getElementById("num").value.trim().toUpperCase();
  let box=document.getElementById("result");

  if(!num) return alert("Enter vehicle number");

  box.innerHTML='<div class="loader">⏳ Fetching data...</div>';

  try{

    // 🔥 IMPORTANT CHANGE (Vercel API)
    let data = await fetchData("/api/challan?num="+num);

    let challans=data?.data || [];

    if(challans.length===0){
      box.innerHTML="✅ No Challan Found";
      return;
    }

    let unpaid=challans.filter(c=>c.challan_status==="UNPAID");

    let total=unpaid.reduce(
      (s,c)=>s+parseFloat(c.data?.total||0),
      0
    );

    let html=`
      <div class="card">
        Total: ${challans.length}<br>
        Unpaid: ${unpaid.length}<br>
        Amount: ₹${total}
      </div>
    `;

    challans.forEach((c,i)=>{

      html+=`
      <div class="card">
        <b>Challan ${i+1}</b><br><br>

        Status: 
        <span class="${c.challan_status==='UNPAID'?'red':'green'}">
          ${c.challan_status}
        </span><br>

        Date: ${fmt(c.violations?.date)}<br>
        Offence: ${c.violations?.details?.[0]?.offence || "—"}<br>
        Location: ${c.violations?.location || "—"}<br>
        Amount: ₹${c.data?.total || "0"}
      </div>`;
    });

    box.innerHTML=html;

  }catch(e){
    box.innerHTML=`
      ❌ Server slow / API failed<br><br>
      <button onclick="search()">Retry</button>
    `;
  }
}

</script>

</body>
</html>
